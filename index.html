<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oito Protótipos - Prototipagem 3D Open Source</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f7f9fa; color: #2c3e50; padding: 0; margin: 0;
            display: flex; flex-direction: column; height: 100vh;
        }
        header {
            background-color: #ffffff; padding: 14px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #e1e8ed; z-index: 10;
        }
        h1 { margin: 0; color: #1e7e34; font-size: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .clear-btn {
            background: #e74c3c; color: white; border: none; padding: 6px 14px;
            border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px;
        }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 100%; animation: fadeIn 0.2s ease; }
        .msg-wrapper.user { align-self: flex-end; align-items: flex-end; max-width: 80%; }
        .msg-wrapper.teacher { align-self: flex-start; align-items: flex-start; width: 100%; }

        .msg { padding: 14px; border-radius: 6px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .user .msg { background: #ebf5ff; color: #2b6cb0; border: 1px solid #bee3f8; font-weight: bold; }
        
        .teacher .msg { 
            background: #ffffff; color: #1a202c; border: 1px solid #b2c2d1;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03); font-size: 14px;
        }
        
        .code-block {
            background: #1a1a1a; color: #f8f8f2; font-family: 'Courier New', Courier, monospace;
            padding: 15px; border-radius: 6px; font-size: 13px; white-space: pre-wrap;
            margin-top: 10px; border: 1px solid #333333; overflow-x: auto;
        }

        .download-btn {
            display: inline-flex; align-items: center; gap: 8px; margin-top: 12px;
            background: #1e7e34; color: white; border: none; padding: 8px 16px;
            border-radius: 4px; font-weight: bold; font-size: 13px; cursor: pointer; text-decoration: none;
        }
        .download-btn:hover { background: #155d27; }
        
        .label { font-size: 10px; color: #718096; margin-bottom: 3px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }

        #controls {
            padding: 15px 20px 25px 20px; background-color: #ffffff; border-top: 2px solid #e1e8ed;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .text-input-group { display: flex; gap: 8px; width: 100%; max-width: 600px; margin: 0 auto; }
        .text-input-group input {
            flex: 1; padding: 12px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 14px;
        }
        .text-input-group button {
            background: #1e7e34; color: white; border: none; padding: 0 20px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px;
        }

        #status { font-size: 12px; color: #4a5568; font-weight: bold; min-height: 18px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>OITO PROTÓTIPOS - ENGENHARIA DE PROTÓTIPOS 3D 🛠️</h1>
        <button class="clear-btn" onclick="clearChat()">Limpar Prancheta</button>
    </header>

    <div id="chat-container">
        <div class="msg-wrapper teacher">
            <span class="label">Sistema</span>
            <div class="msg">Bem-vindo ao laboratório de modelagem open source. Digite a ideia do produto, brinde ou MVP da sua startup abaixo para gerar a análise comercial e o código estruturado do modelo para download.</div>
        </div>
    </div>

    <div id="controls">
        <div id="status">Pronto para modelagem programática.</div>
        <div class="text-input-group">
            <input type="text" id="mvpPrompt" placeholder="Ex: Chaveiro corporativo retangular de 50mm escrito ADM em relevo...">
            <button onclick="generateMvp()">Gerar Modelo</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const status = document.getElementById('status');
        const defaultInstructions = chatContainer.innerHTML;

        function clearChat() {
            chatContainer.innerHTML = defaultInstructions;
            status.innerText = "Pronto para novas atividades.";
        }

        function addMessage(text, sender, labelName) {
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${sender}`;
            const lbl = document.createElement('span');
            lbl.className = 'label'; lbl.innerText = labelName;
            const msg = document.createElement('div');
            msg.className = 'msg'; msg.innerText = text;
            wrapper.appendChild(lbl); wrapper.appendChild(msg);
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return wrapper;
        }

        async function generateMvp() {
            const promptInput = document.getElementById('mvpPrompt');
            const promptVal = promptInput.value.trim();
            if (!promptVal) return;

            status.innerText = "Processando geometria e análise de mercado... ⚙️";
            addMessage(promptVal, 'user', 'Solicitação do Aluno');
            promptInput.value = '';

            try {
                const response = await fetch('/generate-mvp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_prompt: promptVal })
                });
                const data = await response.json();
                
                if (data.success) {
                    // 1. Adiciona a caixa com a justificativa comercial do MVP
                    const teacherWrapper = addMessage(data.justificativa, 'teacher', 'Análise Comercial do MVP');
                    
                    // 2. Se houver código OpenSCAD gerado, renderiza o bloco de código e o botão open-source
                    if (data.codigo_scad && data.codigo_scad.length > 0) {
                        const codeBox = document.createElement('div');
                        codeBox.className = 'code-block';
                        codeBox.innerText = data.codigo_scad;
                        teacherWrapper.querySelector('.msg').appendChild(codeBox);

                        // Criação dinâmica do arquivo .scad open-source para download direto
                        const blob = new Blob([data.codigo_scad], { type: 'text/plain' });
                        const blobUrl = URL.createObjectURL(blob);

                        const downloadLink = document.createElement('a');
                        downloadLink.className = 'download-btn';
                        downloadLink.href = blobUrl;
                        downloadLink.download = 'modelo_prototipo.scad';
                        downloadLink.innerHTML = '💾 Baixar Código Open Source (.SCAD)';
                        teacherWrapper.querySelector('.msg').appendChild(downloadLink);
                    }
                    status.innerText = "Modelo gerado com sucesso.";
                } else {
                    addMessage(data.error, 'teacher', 'Filtro do Sistema');
                    status.innerText = "Geração interrompida por segurança.";
                }
            } catch (e) {
                status.innerText = "Erro ao conectar com o motor geométrico.";
            }
        }
    </script>
</body>
</html>
